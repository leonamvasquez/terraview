version: 2

project_name: terraview

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: terraview
    main: .
    binary: terraview
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - prompts/*

  - id: assets
    meta: true
    name_template: "{{ .ProjectName }}-assets"
    files:
      - prompts/*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ── Supply-Chain: SBOM (CycloneDX via syft) ──────────────────────────
sboms:
  - artifacts: archive
    cmd: syft
    args: ["${artifact}", "--output", "cyclonedx-json=${document}"]
    documents:
      - "${artifact}.cdx.json"

# ── Supply-Chain: Cosign keyless signing ─────────────────────────────
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"

# ── Homebrew tap ─────────────────────────────────────────────────────
brews:
  - name: terraview
    repository:
      owner: leonamvasquez
      name: homebrew-terraview
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update {{ .ProjectName }} to {{ .Tag }}"
    homepage: https://github.com/leonamvasquez/terraview
    description: |
      Revisor semântico para planos Terraform. Combina scanners estáticos
      (Checkov, tfsec, Terrascan) com revisão inteligente por IA.
    license: MIT
    skip_upload: auto
    install: |
      bin.install "terraview"
      ln -sf bin/"terraview" libexec/"tv"
      bin.install_symlink libexec/"tv"
    test: |
      system "#{bin}/terraview", "version"
    extra_install: |
      generate_completions_from_executable(bin/"terraview", "completion")

changelog:
  sort: asc
  use: github
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\(.+?\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\(.+?\))??!?:.+$'
      order: 1
    - title: "⚡ Performance"
      regexp: '^.*?perf(\(.+?\))??!?:.+$'
      order: 2
    - title: "♻️  Refactor"
      regexp: '^.*?refactor(\(.+?\))??!?:.+$'
      order: 3
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: leonamvasquez
    name: terraview
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
