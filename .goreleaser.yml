version: 2

project_name: terraview

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: terraview
    main: .
    binary: terraview
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - prompts/*

  - id: assets
    meta: true
    name_template: "{{ .ProjectName }}-assets"
    files:
      - prompts/*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: leonamvasquez
    name: terraview
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
