# =============================================================================
# .terraview.yaml — Terraview Configuration
# =============================================================================
#
# This file can be placed in two locations:
#   1. ~/.terraview/.terraview.yaml   (global, lower priority)
#   2. <project>/.terraview.yaml      (local, higher priority)
#
# Local values override global ones. Omitted fields use defaults.
#
# WARNING: Never commit api_key directly in this file.
#          Prefer environment variables (ANTHROPIC_API_KEY, GEMINI_API_KEY, etc.)
#          or add .terraview.yaml to your .gitignore.
#
# =============================================================================

# ---------------------------------------------------------------------------
# llm — AI provider configuration
# ---------------------------------------------------------------------------
llm:
  # Enable AI analysis (default: true).
  # Use --static on the CLI to disable on a per-run basis.
  enabled: true

  # AI provider. Options:
  #   ollama      — local inference (no API key required)
  #   gemini      — Google Gemini
  #   claude      — Anthropic Claude
  #   openai      — OpenAI / compatible endpoints
  #   deepseek    — DeepSeek
  #   openrouter  — OpenRouter (multiple models)
  #   gemini-cli  — Gemini via CLI
  #   claude-code — Claude Code via CLI
  provider: ollama

  # Model to use. Each provider has a cost-effective default:
  #   ollama:      llama3.1:8b        (local, free)
  #   gemini:      gemini-2.5-flash   ($0.15/$0.60 per 1M tokens)
  #   claude:      claude-haiku-4-5   ($1/$5 per 1M tokens)
  #   openai:      gpt-4o-mini        ($0.25/$2 per 1M tokens)
  #   deepseek:    deepseek-v3.2      ($0.14/$0.28 per 1M tokens)
  #   openrouter:  google/gemini-2.5-flash
  #   gemini-cli:  gemini-2.5-flash
  #   claude-code: claude-haiku-4-5
  #
  # For higher quality, override with premium models:
  #   claude-sonnet-4-6, claude-opus-4-6, gpt-4o, gemini-2.5-pro
  model: ""

  # Provider base URL (only for ollama or custom endpoints).
  url: "http://localhost:11434"

  # API key for providers that require authentication.
  # IMPORTANT: Prefer environment variables instead of placing the key here:
  #   ANTHROPIC_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY,
  #   DEEPSEEK_API_KEY, OPENROUTER_API_KEY
  # api_key: ""

  # Timeout in seconds for provider calls (default: 120).
  timeout_seconds: 120

  # Temperature for text generation (0.0 to 1.0, default: 0.2).
  # Lower values = more deterministic responses.
  temperature: 0.2

  # Maximum resources included in the AI prompt (default: 30).
  # Plans with more resources are truncated to fit the context window.
  # Increase for large plans if the model supports a wider context.
  # max_resources: 30

  # Enable persistent AI response cache to avoid redundant API calls on reruns.
  # Cache is stored at ~/.terraview/cache/ai-cache.json
  # cache: false

  # Cache TTL in hours (default: 24). Entries older than this are ignored.
  # cache_ttl_hours: 24

  # Ollama-specific settings
  ollama:
    # Context window size (default: 4096).
    # Increase for models that support larger contexts (e.g., 8192, 32768).
    # num_ctx: 4096

    # CPU thread limit (0 = use all cores).
    # max_threads: 0

    # Memory limit in MB (0 = no limit).
    # max_memory_mb: 0

    # Minimum free memory in MB before cancelling the analysis.
    min_free_memory_mb: 1024

# ---------------------------------------------------------------------------
# scoring — Severity weights for score calculation
# ---------------------------------------------------------------------------
scoring:
  severity_weights:
    critical: 5.0
    high: 3.0
    medium: 1.0
    low: 0.5

# ---------------------------------------------------------------------------
# rules — Rule configuration
# ---------------------------------------------------------------------------
rules:
  # Required tags on all resources (e.g., ["Environment", "Team"]).
  # required_tags: []

  # Additional rule packs to load.
  # rule_packs: []

  # Strict mode via config (equivalent to --strict on the CLI).
  # strict_mode: false

  # Disabled rules by ID (e.g., ["SEC001", "TAG002"]).
  # disabled_rules: []

  # Enable only these rules (ignores all others).
  # enabled_rules: []

# ---------------------------------------------------------------------------
# output — Default output format
# ---------------------------------------------------------------------------
output:
  # Format: pretty (default), compact, json, sarif
  format: pretty

# ---------------------------------------------------------------------------
# scanner — Default security scanner
# ---------------------------------------------------------------------------
scanner:
  # Default scanner: checkov, tfsec, terrascan
  # Can be omitted — the first argument of 'scan' defines the scanner.
  # default: checkov
