description: |
  EKS cluster with public API endpoint accessible from 0.0.0.0/0, no
  control-plane logging, no envelope encryption, node group with SSH open
  to the internet (port 22 from 0.0.0.0/0), and an IAM role with
  AdministratorAccess attached. Tests cross-resource IAM + network analysis.

required_topics:
  - public
  - ssh

required_resources:
  - aws_eks_cluster.main
  - aws_security_group.eks_nodes

min_severity:
  HIGH: 2

summary_contains:
  - public
