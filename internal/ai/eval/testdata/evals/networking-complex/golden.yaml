description: |
  VPC with bastion security group exposing SSH+RDP from 0.0.0.0/0, ALB
  without deletion protection or access logs, CloudWatch log groups without
  KMS encryption, Transit Gateway with auto-accept enabled, and WAF with
  no rules. Tests network exposure and multi-resource correlation.

required_topics:
  - ssh
  - encrypt

required_resources:
  - aws_security_group.bastion
  - aws_lb.external

min_severity:
  HIGH: 1

summary_contains:
  - security group
