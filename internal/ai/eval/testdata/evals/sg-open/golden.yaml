description: |
  Bastion EC2 with a wide-open security group (SSH + RDP from 0.0.0.0/0)
  and a public IP. The model must flag both the SG rules and the blast
  radius of the public bastion.

required_topics:
  - security group
  - 0.0.0.0

required_resources:
  - aws_security_group.web
  - aws_instance.bastion

min_severity:
  HIGH: 1
