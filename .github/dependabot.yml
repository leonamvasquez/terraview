# ============================================================================
# Dependabot — atualização automática de dependências
# https://docs.github.com/en/code-security/dependabot
# ============================================================================

version: 2

updates:
  # Go modules (go.mod / go.sum)
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - go
    reviewers:
      - leonamvasquez

  # GitHub Actions (workflow pinned SHAs)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - ci

  # Docker (Dockerfile base images)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
    labels:
      - dependencies
      - docker
