name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions: read-all

jobs:
  # ════════════════════════════════════════════════════════════════════
  # PR + PUSH — jobs leves que rodam em todo evento (feedback rápido)
  # ════════════════════════════════════════════════════════════════════

  # ──────────────────────────────────────────────────────────────────
  # LINT — estilo, erros estáticos, padrões de código
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      # Instalado via go install para compilar com o Go do runner (1.26)
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - name: Run golangci-lint
        run: golangci-lint run

  # ──────────────────────────────────────────────────────────────────
  # TEST — testes unitários com detector de race conditions + cobertura
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - run: go vet ./...
      - name: Run tests with race detector
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic
      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────────────────────────
  # BUILD — compilação rápida (linux/amd64) para validar que compila
  # Roda em PRs e push — feedback rápido sem desperdício de minutos
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build (linux/amd64)
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -ldflags "-s -w -X main.version=${VERSION}" -o /dev/null .

  # ──────────────────────────────────────────────────────────────────
  # BUILD MATRIX — compila para as 6 combinações de plataforma/arch
  # Apenas em push para main/develop (não em PRs)
  # ──────────────────────────────────────────────────────────────────
  build-matrix:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          go build -ldflags "-s -w -X main.version=${VERSION}" -o /dev/null .

  # ──────────────────────────────────────────────────────────────────
  # SECRET SCAN — detecta chaves, tokens e credenciais
  # ──────────────────────────────────────────────────────────────────
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload SARIF ao Security tab
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════
  # PUSH ONLY — jobs pesados que rodam apenas em push para main/develop
  # Scans de segurança profundos já cobertos pelo weekly.yml em PRs
  # ════════════════════════════════════════════════════════════════════

  # ──────────────────────────────────────────────────────────────────
  # SAST — análise estática de segurança do código-fonte (Semgrep)
  # Detecta: SQLi, path traversal, command injection, crypto fraca, etc.
  # ──────────────────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >
            p/golang
            p/security-audit
            p/secrets
        env:
          # Token opcional — sem ele roda localmente sem upload ao dashboard
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ──────────────────────────────────────────────────────────────────
  # DEPENDENCY CHECK — CVEs em dependências diretas e indiretas
  # govulncheck: base de dados oficial Go (VulnDB)
  # osv-scanner: base de dados OSV (Google) — cobre mais ecossistemas
  # ──────────────────────────────────────────────────────────────────
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck (Go VulnDB)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  osv-scan:
    name: OSV Scanner
    if: github.event_name == 'push'
    permissions:
      security-events: write  # upload SARIF ao Security tab
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
    with:
      scan-args: |-
        --lockfile=go.mod
        ./

  # ──────────────────────────────────────────────────────────────────
  # LICENSE AUDIT — bloqueia dependências com licenças restritivas
  # ──────────────────────────────────────────────────────────────────
  licenses:
    name: License Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check licenses
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... --disallowed_types=restricted

  # ──────────────────────────────────────────────────────────────────
  # FUZZ SMOKE — testa o parser com inputs aleatórios por 30s
  # Só roda em push para main (não em PRs) para economizar minutos
  # ──────────────────────────────────────────────────────────────────
  fuzz:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Fuzz Parse (30s)
        run: go test ./internal/parser/ -fuzz=FuzzParse -fuzztime=30s
      - name: Fuzz NormalizeAction (30s)
        run: go test ./internal/parser/ -fuzz=FuzzNormalizeAction -fuzztime=30s
