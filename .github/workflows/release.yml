name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  gate:
    name: Gate (Test + Fuzz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        run: go test ./... -race
      - name: Fuzz seed corpus
        # In CI only the seed corpus is run as regular unit tests.
        # Real fuzzing (with -fuzz) runs in the weekly job (weekly.yml).
        run: |
          go test ./internal/parser/ -run=FuzzParse
          go test ./internal/parser/ -run=FuzzNormalizeAction

  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: write   # create GitHub Release and upload assets
      id-token: write   # cosign keyless signing via OIDC
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Compute artifact hashes (SLSA 3)
        id: hash
        run: |
          echo "hashes=$(cat dist/checksums.txt | base64 -w0)" >> $GITHUB_OUTPUT

  packages:
    name: Publish Packages (deb/rpm)
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Cloudsmith CLI
        run: pip install cloudsmith-cli==1.13.0

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" --dir dist --pattern "*.deb" --pattern "*.rpm"

      - name: Publish .deb packages
        if: hashFiles('dist/*.deb') != ''
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          for pkg in dist/*.deb; do
            echo "Publishing $pkg"
            cloudsmith push deb --republish workspace-for-leonam/terraview/any-distro/any-version "$pkg"
          done

      - name: Publish .rpm packages
        if: hashFiles('dist/*.rpm') != ''
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          for pkg in dist/*.rpm; do
            echo "Publishing $pkg"
            cloudsmith push rpm --republish workspace-for-leonam/terraview/any-distro/any-version "$pkg"
          done

  container:
    name: Container
    runs-on: ubuntu-latest
    needs: release
    permissions:
      packages: write      # push to GHCR
      id-token: write      # cosign keyless signing via OIDC
      attestations: write  # GitHub attestations API
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/leonamvasquez/terraview
            docker.io/leonamvasquez/terraview
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64 + linux/arm64)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Docker Scout — CVE scan
        uses: docker/scout-action@8910519cee8ac046f3ee99686b0dc6654d5ba1a7 # v1.20.3
        with:
          command: cves
          image: docker.io/leonamvasquez/terraview:latest
          only-severities: critical,high
          exit-code: true
          summary: true
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout — recommendations
        uses: docker/scout-action@8910519cee8ac046f3ee99686b0dc6654d5ba1a7 # v1.20.3
        with:
          command: recommendations
          image: docker.io/leonamvasquez/terraview:latest
          exit-code: false
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign GHCR image
        run: cosign sign --yes ghcr.io/leonamvasquez/terraview@${{ steps.build.outputs.digest }}

      - name: Sign DockerHub image
        run: cosign sign --yes docker.io/leonamvasquez/terraview@${{ steps.build.outputs.digest }}

  provenance:
    name: Binary Provenance (SLSA 3)
    needs: release
    permissions:
      actions: read    # read workflow context
      id-token: write  # sign provenance via GitHub OIDC
      contents: write  # upload .intoto.jsonl to GitHub Release
    # NOTE: SLSA generators MUST use tag refs — SHA pins break self-verification (exit 27 in final step)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true

  container-provenance:
    name: Container Provenance (SLSA 3)
    needs: container
    permissions:
      actions: read    # read workflow context
      id-token: write  # sign provenance via GitHub OIDC
      packages: write  # upload attestation to GHCR
    # NOTE: SLSA generators MUST use tag refs — SHA pins break self-verification (exit 27 in final step)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/leonamvasquez/terraview
      digest: ${{ needs.container.outputs.digest }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
