name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  # ──────────────────────────────────────────────────────────────────
  # GATE — valida testes e fuzz antes de qualquer publicação
  # ──────────────────────────────────────────────────────────────────
  gate:
    name: Gate (Test + Fuzz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        run: go test ./... -race
      - name: Fuzz seed corpus (validação dos inputs de referência)
        # Em CI apenas o seed corpus é executado como unit tests normais.
        # O fuzzing real (com -fuzz) roda no job semanal (weekly.yml).
        run: |
          go test ./internal/parser/ -run=FuzzParse
          go test ./internal/parser/ -run=FuzzNormalizeAction

  # ──────────────────────────────────────────────────────────────────
  # RELEASE — binários multi-plataforma + SBOM + assinatura cosign
  # ──────────────────────────────────────────────────────────────────
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: write   # criar GitHub Release e upload de assets
      id-token: write   # cosign keyless signing via OIDC
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
      - name: Install syft (gerador de SBOM)
        uses: anchore/sbom-action/download-syft@17ae1740179002c89186b61233e0f892c3118b11 # v0
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Compute artifact hashes (SLSA 3)
        id: hash
        # dist/checksums.txt já contém "<sha256>  <filename>" — formato
        # exato esperado pelo generator_generic_slsa3.
        run: |
          echo "hashes=$(cat dist/checksums.txt | base64 -w0)" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────────────────────────
  # PACKAGES — publicar .deb e .rpm no Cloudsmith
  # ──────────────────────────────────────────────────────────────────
  packages:
    name: Publish Packages (deb/rpm)
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Cloudsmith CLI
        run: pip install cloudsmith-cli==1.13.0

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" --dir dist --pattern "*.deb" --pattern "*.rpm"

      - name: Publish .deb packages
        if: hashFiles('dist/*.deb') != ''
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          for pkg in dist/*.deb; do
            echo "Publishing $pkg"
            cloudsmith push deb --republish workspace-for-leonam/terraview/any-distro/any-version "$pkg"
          done

      - name: Publish .rpm packages
        if: hashFiles('dist/*.rpm') != ''
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          for pkg in dist/*.rpm; do
            echo "Publishing $pkg"
            cloudsmith push rpm --republish workspace-for-leonam/terraview/any-distro/any-version "$pkg"
          done

  # ──────────────────────────────────────────────────────────────────
  # CONTAINER — build multi-arch + push GHCR & DockerHub
  #             Docker Scout CVE scan + cosign + provenance attest
  # ──────────────────────────────────────────────────────────────────
  container:
    name: Container
    runs-on: ubuntu-latest
    needs: release
    permissions:
      packages: write      # push para GHCR
      id-token: write      # cosign keyless signing via OIDC
      attestations: write  # GitHub attestations API
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Buildx para multi-plataforma (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Tags e labels para ambos os registries
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/leonamvasquez/terraview
            docker.io/leonamvasquez/terraview
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build multi-arch e push para GHCR + DockerHub simultaneamente
      - name: Build and push (linux/amd64 + linux/arm64)
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # Docker Scout: CVEs CRÍTICOS/HIGH bloqueiam a release
      - name: Docker Scout — CVE scan
        uses: docker/scout-action@f8c776824083494ab0d56b8105ba2ca85c86e4de # v1
        with:
          command: cves
          image: docker.io/leonamvasquez/terraview:latest
          only-severities: critical,high
          exit-code: true
          summary: true

      # Docker Scout: recomendações de melhoria da imagem
      - name: Docker Scout — recommendations
        uses: docker/scout-action@f8c776824083494ab0d56b8105ba2ca85c86e4de # v1
        with:
          command: recommendations
          image: docker.io/leonamvasquez/terraview:latest
          exit-code: false

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      # Assinar imagem no GHCR (keyless via OIDC)
      - name: Sign GHCR image
        run: cosign sign --yes ghcr.io/leonamvasquez/terraview@${{ steps.build.outputs.digest }}

      # Assinar imagem no DockerHub (keyless via OIDC)
      - name: Sign DockerHub image
        run: cosign sign --yes docker.io/leonamvasquez/terraview@${{ steps.build.outputs.digest }}

  # ──────────────────────────────────────────────────────────────────
  # PROVENANCE — binários: job isolado e efêmero (SLSA 3)
  # O generator_generic_slsa3 roda em um workflow reutilizável separado,
  # o provenance é assinado via GitHub OIDC sem acesso ao contexto do
  # job de build — requisito central do SLSA 3.
  # ──────────────────────────────────────────────────────────────────
  provenance:
    name: Binary Provenance (SLSA 3)
    needs: release
    permissions:
      actions: read    # leitura do contexto do workflow
      id-token: write  # assinar provenance via GitHub OIDC
      contents: write  # upload do .intoto.jsonl na GitHub Release
    # NOTE: SLSA generators MUST use tag refs — SHA pins break self-verification (exit 27 in final step)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true

  # ──────────────────────────────────────────────────────────────────
  # CONTAINER PROVENANCE — imagem GHCR: job isolado (SLSA 3)
  # ──────────────────────────────────────────────────────────────────
  container-provenance:
    name: Container Provenance (SLSA 3)
    needs: container
    permissions:
      actions: read    # leitura do contexto do workflow
      id-token: write  # assinar provenance via GitHub OIDC
      packages: write  # upload attestation no GHCR
    # NOTE: SLSA generators MUST use tag refs — SHA pins break self-verification (exit 27 in final step)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/leonamvasquez/terraview
      digest: ${{ needs.container.outputs.digest }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
