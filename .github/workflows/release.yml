name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write       # GoReleaser: criar GitHub Release
  packages: write       # push da imagem para GHCR
  id-token: write       # cosign keyless signing via OIDC
  attestations: write   # GitHub build-provenance attestation
  security-events: write # upload SARIF ao Security tab

jobs:
  # ──────────────────────────────────────────────────────────────────
  # GATE — valida testes e fuzz antes de qualquer publicação
  # ──────────────────────────────────────────────────────────────────
  gate:
    name: Gate (Test + Fuzz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        run: go test ./... -race
      - name: Fuzz smoke (30s cada)
        run: |
          go test ./internal/parser/ -fuzz=FuzzParse -fuzztime=30s
          go test ./internal/parser/ -fuzz=FuzzNormalizeAction -fuzztime=30s

  # ──────────────────────────────────────────────────────────────────
  # RELEASE — binários multi-plataforma + SBOM + assinatura cosign
  # ──────────────────────────────────────────────────────────────────
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install syft (gerador de SBOM)
        uses: anchore/sbom-action/download-syft@v0
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Attest provenance dos binários
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/checksums.txt

  # ──────────────────────────────────────────────────────────────────
  # CONTAINER — build + push GHCR + Docker Scout + cosign + attest
  # ──────────────────────────────────────────────────────────────────
  container:
    name: Container
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/leonamvasquez/terraview
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub (para Docker Scout)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Docker Scout: CVEs CRÍTICOS bloqueiam a release
      - name: Docker Scout — CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ghcr.io/leonamvasquez/terraview:latest
          only-severities: critical,high
          exit-code: true
          summary: true

      # Docker Scout: recomendações de melhoria da imagem
      - name: Docker Scout — recommendations
        uses: docker/scout-action@v1
        with:
          command: recommendations
          image: ghcr.io/leonamvasquez/terraview:latest
          exit-code: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Assinar imagem com cosign (keyless)
        run: cosign sign --yes ghcr.io/leonamvasquez/terraview@${{ steps.build.outputs.digest }}

      - name: Attest provenance da imagem
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/leonamvasquez/terraview
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
