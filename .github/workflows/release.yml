name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # GoReleaser: criar GitHub Release
  packages: write        # push da imagem para GHCR
  id-token: write        # cosign keyless signing via OIDC
  attestations: write    # GitHub attestations API
  security-events: write # upload SARIF ao Security tab
  actions: read          # slsa-github-generator: leitura do contexto do workflow

jobs:
  # ──────────────────────────────────────────────────────────────────
  # GATE — valida testes e fuzz antes de qualquer publicação
  # ──────────────────────────────────────────────────────────────────
  gate:
    name: Gate (Test + Fuzz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        run: go test ./... -race
      - name: Fuzz smoke (30s cada)
        run: |
          go test ./internal/parser/ -fuzz=FuzzParse -fuzztime=30s
          go test ./internal/parser/ -fuzz=FuzzNormalizeAction -fuzztime=30s

  # ──────────────────────────────────────────────────────────────────
  # RELEASE — binários multi-plataforma + SBOM + assinatura cosign
  # ──────────────────────────────────────────────────────────────────
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install syft (gerador de SBOM)
        uses: anchore/sbom-action/download-syft@v0
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Compute artifact hashes (SLSA 3)
        id: hash
        # dist/checksums.txt já contém "<sha256>  <filename>" — formato
        # exato esperado pelo generator_generic_slsa3.
        run: |
          echo "hashes=$(cat dist/checksums.txt | base64 -w0)" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────────────────────────
  # PACKAGES — publicar .deb e .rpm no Cloudsmith
  # ──────────────────────────────────────────────────────────────────
  packages:
    name: Publish Packages (deb/rpm)
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Cloudsmith CLI
        run: pip install cloudsmith-cli

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" --dir dist --pattern "*.deb" --pattern "*.rpm"

      - name: Publish .deb packages
        if: hashFiles('dist/*.deb') != ''
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          for pkg in dist/*.deb; do
            echo "Publishing $pkg"
            cloudsmith push deb workspace-for-leonam/terraview/any-distro/any-version "$pkg"
          done

      - name: Publish .rpm packages
        if: hashFiles('dist/*.rpm') != ''
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          for pkg in dist/*.rpm; do
            echo "Publishing $pkg"
            cloudsmith push rpm workspace-for-leonam/terraview/any-distro/any-version "$pkg"
          done

  # ──────────────────────────────────────────────────────────────────
  # CONTAINER — build multi-arch + push GHCR & DockerHub
  #             Docker Scout CVE scan + cosign + provenance attest
  # ──────────────────────────────────────────────────────────────────
  container:
    name: Container
    runs-on: ubuntu-latest
    needs: release
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Buildx para multi-plataforma (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Tags e labels para ambos os registries
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/leonamvasquez/terraview
            docker.io/leonamvasquez/terraview
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build multi-arch e push para GHCR + DockerHub simultaneamente
      - name: Build and push (linux/amd64 + linux/arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # Docker Scout: CVEs CRÍTICOS/HIGH bloqueiam a release
      - name: Docker Scout — CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: docker.io/leonamvasquez/terraview:latest
          only-severities: critical,high
          exit-code: true
          summary: true

      # Docker Scout: recomendações de melhoria da imagem
      - name: Docker Scout — recommendations
        uses: docker/scout-action@v1
        with:
          command: recommendations
          image: docker.io/leonamvasquez/terraview:latest
          exit-code: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Assinar imagem no GHCR (keyless via OIDC)
      - name: Sign GHCR image
        run: cosign sign --yes ghcr.io/leonamvasquez/terraview@${{ steps.build.outputs.digest }}

      # Assinar imagem no DockerHub (keyless via OIDC)
      - name: Sign DockerHub image
        run: cosign sign --yes docker.io/leonamvasquez/terraview@${{ steps.build.outputs.digest }}

  # ──────────────────────────────────────────────────────────────────
  # PROVENANCE — binários: job isolado e efêmero (SLSA 3)
  # O generator_generic_slsa3 roda em um workflow reutilizável separado,
  # o provenance é assinado via GitHub OIDC sem acesso ao contexto do
  # job de build — requisito central do SLSA 3.
  # ──────────────────────────────────────────────────────────────────
  provenance:
    name: Binary Provenance (SLSA 3)
    needs: release
    permissions:
      actions: read    # leitura do contexto do workflow
      id-token: write  # assinar provenance via GitHub OIDC
      contents: write  # upload do .intoto.jsonl na GitHub Release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true

  # ──────────────────────────────────────────────────────────────────
  # CONTAINER PROVENANCE — imagem GHCR: job isolado (SLSA 3)
  # ──────────────────────────────────────────────────────────────────
  container-provenance:
    name: Container Provenance (SLSA 3)
    needs: container
    permissions:
      actions: read    # leitura do contexto do workflow
      id-token: write  # assinar provenance via GitHub OIDC
      packages: write  # upload attestation no GHCR
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/leonamvasquez/terraview
      digest: ${{ needs.container.outputs.digest }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
