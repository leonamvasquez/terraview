name: Weekly Security

on:
  schedule:
    - cron: "0 3 * * 0" # Sunday 03:00 UTC
  workflow_dispatch: # manual trigger from GitHub UI

permissions: read-all

jobs:
  vuln-go:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  vuln-osv:
    name: OSV Scanner
    permissions:
      security-events: write  # upload SARIF to Security tab
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    with:
      scan-args: |-
        --lockfile=go.mod
        ./

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan --config p/golang --config p/security-audit --config p/secrets \
            --error --quiet .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  fuzz:
    name: Fuzz Extended (2min)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Fuzz Parse
        # go test -fuzz returns exit 1 on fuzztime exceeded (expected Go behavior);
        # the bash wrapper distinguishes expected timeout from real crash.
        run: |
          output=$(go test ./internal/parser/ -fuzz=FuzzParse -fuzztime=2m 2>&1) && echo "$output" || {
            echo "$output"
            echo "$output" | grep -q "context deadline exceeded" && echo "Fuzz timeout OK" || exit 1
          }
      - name: Fuzz NormalizeAction
        run: |
          output=$(go test ./internal/parser/ -fuzz=FuzzNormalizeAction -fuzztime=2m 2>&1) && echo "$output" || {
            echo "$output"
            echo "$output" | grep -q "context deadline exceeded" && echo "Fuzz timeout OK" || exit 1
          }

  container-scout:
    name: Container Scan (Docker Scout)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub (required for Docker Scout)
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout — CVE scan
        uses: docker/scout-action@8910519cee8ac046f3ee99686b0dc6654d5ba1a7 # v1.20.3
        with:
          command: cves
          image: ghcr.io/leonamvasquez/terraview:latest
          only-severities: critical,high
          exit-code: true
          summary: true
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
