name: Terraview Review

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Terraform Plan Review
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Terraview
        run: |
          curl -sSL https://github.com/leonamvasquez/terraview/releases/latest/download/terraview-linux-amd64 -o /usr/local/bin/terraview
          chmod +x /usr/local/bin/terraview

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan -input=false
          terraform show -json tfplan > plan.json

      - name: Terraview Review
        id: review
        run: |
          terraview review \
            --plan plan.json \
            --format json \
            --diagram \
            --blast-radius \
            --profile prod \
            --output review-output
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body = '## Terraview Review\n\n';

            // Read review markdown if available
            try {
              const md = fs.readFileSync('review-output/review.md', 'utf8');
              body += md;
            } catch (e) {
              body += '> Review output not available.\n';
            }

            // Read JSON for verdict
            try {
              const json = JSON.parse(fs.readFileSync('review-output/review.json', 'utf8'));
              const verdict = json.verdict;
              if (verdict) {
                const emoji = verdict.safe ? ':white_check_mark:' : ':x:';
                body = `## ${emoji} Terraview: ${verdict.label}\n\n` + body;
              }
            } catch (e) {
              // ignore
            }

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Check Exit Code
        if: steps.review.outputs.exit_code != '0'
        run: exit ${{ steps.review.outputs.exit_code }}
