linters:
  enable:
    - errcheck
    - staticcheck
    - gosimple
    - gosec
    - gocritic
    - ineffassign
    - govet
    - unused
    - typecheck
    - misspell
    - prealloc
    - gofmt
    - goimports
    - unconvert
    - unparam
    - bodyclose
    - noctx

linters-settings:
  errcheck:
    check-type-assertions: true
  goimports:
    local-prefixes: github.com/leonamvasquez/terraview
  gosec:
    excludes:
      - G104  # unhandled errors on deferred Close()
      - G204  # subprocess from variable (expected — CLI wraps terraform/scanner binaries)
      - G304  # file path from variable (expected for CLI tool)
      - G306  # WriteFile 0644 (output reports should be user-readable)
      - G110  # decompression bomb (downloads from trusted GitHub releases only)
      - G115  # integer overflow int64→uint32 (tar header Mode, standard Go pattern)
      - G305  # file traversal in tar (extracting from trusted GitHub release archives)
      - G404  # weak random (used for retry jitter, not security)
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - ifElseChain
      - hugeParam
      - rangeValCopy
      - exitAfterDefer
      - preferFprint
      - appendCombine
  misspell:
    locale: US
    ignore-words:
      - comando
      - comandos
      - posicional
      - intencional
      - componentes
      - problemas
      - cancelamento
      - cancelling
      - cancelled
      - penalise
      - persistente
      - correspondente
      - analyses
  prealloc:
    simple: true

issues:
  exclude-rules:
    # Test files can have longer functions and unchecked errors
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - gocritic
        - unparam
    # Generated or vendor code
    - path: vendor/
      linters:
        - all
  max-issues-per-linter: 50
  max-same-issues: 5

run:
  timeout: 5m
  tests: true
