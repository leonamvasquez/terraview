codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "cmd/completion.go"
  - "**/*_test.go"
  - "build/**"
  - "examples/**"
  - "prompts/**"
