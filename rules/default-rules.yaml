version: "1.0"

required_tags:
  - Environment
  - Team
  - Project
  - ManagedBy

taggable_resource_types:
  - aws_instance
  - aws_s3_bucket
  - aws_db_instance
  - aws_rds_cluster
  - aws_dynamodb_table
  - aws_lambda_function
  - aws_ecs_cluster
  - aws_ecs_service
  - aws_ecs_task_definition
  - aws_eks_cluster
  - aws_sqs_queue
  - aws_sns_topic
  - aws_vpc
  - aws_subnet
  - aws_security_group
  - aws_lb
  - aws_lb_target_group
  - aws_ebs_volume
  - aws_efs_file_system
  - aws_elasticache_cluster
  - aws_kinesis_stream
  - aws_cloudwatch_log_group
  - aws_kms_key
  - aws_ecr_repository
  - aws_secretsmanager_secret
  - aws_elasticsearch_domain
  - aws_opensearch_domain

critical_resource_types:
  - aws_db_instance
  - aws_rds_cluster
  - aws_dynamodb_table
  - aws_s3_bucket
  - aws_elasticache_cluster
  - aws_efs_file_system
  - aws_kinesis_stream

rules:
  - id: SEC001
    name: SSH Open to Internet
    description: "Security group allows SSH (port 22) ingress from 0.0.0.0/0. This exposes the instance to brute-force attacks from the entire internet."
    severity: HIGH
    category: security
    remediation: "Restrict SSH access to specific CIDR blocks (e.g., your VPN or bastion host IP). Use AWS Systems Manager Session Manager as a more secure alternative."
    enabled: true
    targets:
      - aws_security_group
      - aws_security_group_rule
    conditions:
      - field: ingress
        operator: contains_in_list
        value: "0.0.0.0/0"

  - id: SEC002
    name: S3 Bucket Without Encryption
    description: "S3 bucket does not have server-side encryption configured. Data at rest should always be encrypted."
    severity: HIGH
    category: security
    remediation: "Enable server-side encryption using aws_s3_bucket_server_side_encryption_configuration with AES256 or aws:kms."
    enabled: true
    targets:
      - aws_s3_bucket
    conditions:
      - field: server_side_encryption_configuration
        operator: not_exists
    companion_excludes:
      - resource_type: aws_s3_bucket_server_side_encryption_configuration
        name_field: bucket

  - id: SEC003
    name: IAM Policy with Wildcard Actions
    description: "IAM policy uses wildcard (*) for actions, granting overly permissive access that violates the principle of least privilege."
    severity: CRITICAL
    category: security
    remediation: "Replace wildcard actions with specific, granular permissions. Use AWS Access Analyzer to identify the minimum required permissions."
    enabled: true
    targets:
      - aws_iam_policy
      - aws_iam_role_policy
      - aws_iam_user_policy
      - aws_iam_group_policy
      - aws_iam_policy_document
    conditions:
      - field: policy
        operator: contains
        value: '"Action":"*"'

  - id: SEC004
    name: IAM Policy with Wildcard Resources
    description: "IAM policy uses wildcard (*) for resources, granting access to all resources in the account."
    severity: HIGH
    category: security
    remediation: "Scope resource ARNs to specific resources or use conditions to limit access."
    enabled: true
    targets:
      - aws_iam_policy
      - aws_iam_role_policy
      - aws_iam_user_policy
      - aws_iam_group_policy
    conditions:
      - field: policy
        operator: contains
        value: '"Resource":"*"'

  - id: SEC005
    name: RDS Publicly Accessible
    description: "RDS instance is configured as publicly accessible. Databases should not be directly reachable from the internet."
    severity: HIGH
    category: security
    remediation: "Set publicly_accessible to false and access the database through a bastion host, VPN, or VPC peering."
    enabled: true
    targets:
      - aws_db_instance
    conditions:
      - field: publicly_accessible
        operator: is_true

  - id: SEC006
    name: S3 Bucket Public ACL
    description: "S3 bucket uses a public ACL, potentially exposing data to the internet."
    severity: HIGH
    category: security
    remediation: "Set acl to 'private' and use S3 Block Public Access settings. Use bucket policies for controlled access."
    enabled: true
    targets:
      - aws_s3_bucket
      - aws_s3_bucket_acl
    conditions:
      - field: acl
        operator: contains
        value: "public"

  - id: SEC007
    name: Security Group Allows All Traffic
    description: "Security group rule allows all traffic (protocol -1 or all) from 0.0.0.0/0."
    severity: CRITICAL
    category: security
    remediation: "Restrict ingress to only the required ports and source CIDR blocks."
    enabled: true
    targets:
      - aws_security_group
      - aws_security_group_rule
    conditions:
      - field: ingress
        operator: contains_in_list
        value: "0.0.0.0/0"

  - id: REL001
    name: RDS Without Multi-AZ
    description: "RDS instance does not have Multi-AZ enabled, creating a single point of failure for the database."
    severity: MEDIUM
    category: reliability
    remediation: "Enable multi_az for production databases to ensure automatic failover capability."
    enabled: true
    targets:
      - aws_db_instance
    conditions:
      - field: multi_az
        operator: is_false

  - id: REL002
    name: RDS Without Backup
    description: "RDS instance has backup retention set to 0, meaning no automated backups are taken."
    severity: HIGH
    category: reliability
    remediation: "Set backup_retention_period to at least 7 days for production databases."
    enabled: true
    targets:
      - aws_db_instance
    conditions:
      - field: backup_retention_period
        operator: equals
        value: "0"

  - id: BP001
    name: S3 Bucket Without Versioning
    description: "S3 bucket does not have versioning enabled, making it impossible to recover from accidental deletes or overwrites."
    severity: MEDIUM
    category: best-practice
    remediation: "Enable versioning using aws_s3_bucket_versioning resource."
    enabled: true
    targets:
      - aws_s3_bucket
    conditions:
      - field: versioning
        operator: not_exists
    companion_excludes:
      - resource_type: aws_s3_bucket_versioning
        name_field: bucket

  - id: BP002
    name: EBS Volume Without Encryption
    description: "EBS volume is not encrypted. All block storage should be encrypted at rest."
    severity: MEDIUM
    category: security
    remediation: "Set encrypted = true on the aws_ebs_volume resource or enable default EBS encryption for the account."
    enabled: true
    targets:
      - aws_ebs_volume
    conditions:
      - field: encrypted
        operator: is_false

  - id: COMP001
    name: CloudWatch Logs Without Retention
    description: "CloudWatch Log Group does not have a retention period set, leading to unbounded log storage costs."
    severity: LOW
    category: maintainability
    remediation: "Set retention_in_days to an appropriate value (e.g., 30, 90, or 365 days)."
    enabled: true
    targets:
      - aws_cloudwatch_log_group
    conditions:
      - field: retention_in_days
        operator: not_exists
